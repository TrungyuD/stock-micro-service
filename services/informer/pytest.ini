[pytest]
testpaths = tests
pythonpath = src src/generated

# Proto descriptor pool conflict: legacy (informer_pb2) and v1 (financial_pb2)
# both register symbols in stock.informer.v1 namespace. They cannot coexist in
# the same Python process. Default `pytest` run loads only v1 tests (safe for CI).
# Run legacy tests explicitly:
#   pytest tests/test_informer_handler.py tests/test_stock_admin_handler.py \
#          tests/test_rate_limiter.py tests/test_retry.py tests/test_validators.py tests/test_stock_repository.py
addopts = --ignore=tests/test_informer_handler.py --ignore=tests/test_stock_admin_handler.py
