# =============================================================================
# Docker Compose — Local Development Infrastructure
# Services: PostgreSQL 15 + TimescaleDB, pgAdmin 4
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL with TimescaleDB extension
  # ---------------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: stock_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-stock_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stock_password}
      POSTGRES_DB: ${DB_NAME:-stock_db}
    ports:
      - "${DB_PORT:-5311}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount entire init-db/ dir so 01-schema.sql and 02-seed.sql run in order
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-stock_user} -d ${DB_NAME:-stock_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - stock_network

  # ---------------------------------------------------------------------------
  # pgAdmin 4 — PostgreSQL web admin UI
  # Access: http://localhost:5050
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stock_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@stock.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5312}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stock_network

# -----------------------------------------------------------------------------
# Named volumes — persisted across container restarts
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

# -----------------------------------------------------------------------------
# Internal bridge network
# -----------------------------------------------------------------------------
networks:
  stock_network:
    driver: bridge
