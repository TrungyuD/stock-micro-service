syntax = "proto3";
package stock.common;
option go_package = "stock/common";

// Shared health check service — each gRPC server registers this alongside domain services.

service HealthService {
  // Standard health check. Deadline: 3s.
  rpc Check (HealthCheckRequest) returns (HealthCheckResponse);
}

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;   // "SERVING" or "NOT_SERVING"
  string version = 2;  // Service version string
  string uptime = 3;   // Human-readable uptime
}
