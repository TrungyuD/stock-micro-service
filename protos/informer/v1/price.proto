syntax = "proto3";
package stock.informer.v1;
option go_package = "stock/informer/v1";

import "common/timestamp.proto";

// PriceService — Price data retrieval and real-time streaming.
service PriceService {
  // Get latest price snapshot for a single symbol. Deadline: 5s.
  rpc GetLatestPrice (GetLatestPriceRequest) returns (PricePoint);
  // Batch get latest prices for multiple symbols. Max 50. Deadline: 10s.
  rpc GetLatestPrices (GetLatestPricesRequest) returns (BatchPriceResponse);
  // Get OHLCV candle data. Deadline: 15s.
  rpc GetOHLCV (GetOHLCVRequest) returns (OHLCVResponse);
  // Server streaming — continuous price updates. No deadline (long-lived).
  rpc StreamPrices (StreamPricesRequest) returns (stream PriceUpdate);
  // Server streaming — stock update events (price + metadata changes).
  rpc WatchStockUpdates (WatchStockUpdatesRequest) returns (stream StockUpdate);
}

// OHLCV candlestick — moved from common/types.proto
message OHLCV {
  string date = 1;              // ISO 8601: "2026-03-04"
  double open = 2;
  double high = 3;
  double low = 4;
  double close = 5;
  int64 volume = 6;
  double adjusted_close = 7;
}

// Single price snapshot
message PricePoint {
  string symbol = 1;
  double last_price = 2;
  double previous_close = 3;
  double change_pct = 4;        // ((last - prev) / prev) * 100
  int64 timestamp = 5;          // Unix epoch seconds (UTC)
}

// --- Request/Response messages ---

message GetLatestPriceRequest {
  string symbol = 1;
}

message GetLatestPricesRequest {
  repeated string symbols = 1;  // Max 50 symbols
}

message BatchPriceResponse {
  repeated PricePoint prices = 1;
  repeated string failed = 2;   // Symbols that failed to fetch
}

message GetOHLCVRequest {
  string symbol = 1;
  string interval = 2;          // "1d", "1wk", "1mo"
  string start_date = 3;        // ISO 8601
  string end_date = 4;          // ISO 8601
  int32 limit = 5;              // Max candles (default 365)
}

message OHLCVResponse {
  string symbol = 1;
  repeated OHLCV candles = 2;
  int32 total_records = 3;
  string period_start = 4;
  string period_end = 5;
}

// --- Streaming messages ---

message StreamPricesRequest {
  repeated string symbols = 1;  // Symbols to stream
  int32 interval_ms = 2;        // Update interval in ms (default 15000)
}

message PriceUpdate {
  string symbol = 1;
  double last_price = 2;
  double previous_close = 3;
  double change_pct = 4;
  int64 timestamp = 5;
}

message WatchStockUpdatesRequest {
  repeated string symbols = 1;
}

message StockUpdate {
  string symbol = 1;
  string update_type = 2;       // "price", "metadata", "status"
  PriceUpdate price = 3;        // Set when update_type = "price"
  string metadata_json = 4;     // Set when update_type = "metadata"
  int64 timestamp = 5;
}
